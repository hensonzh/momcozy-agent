<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBCLC 在线咨询</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef4f2;
        color: #172625;
        --page-max-width: 390px;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: stretch center;
        background: linear-gradient(180deg, #f8fcfb 0%, #e9f2ef 100%);
      }
      .page {
        display: grid;
        width: min(100vw, var(--page-max-width));
        height: 100dvh;
        min-height: 100svh;
        grid-template-rows: auto 1fr auto;
        margin: 0 auto;
        background: #fff;
      }
      header {
        padding: calc(12px + var(--safe-top)) 14px 10px;
        border-bottom: 1px solid #dce8e5;
      }
      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }
      header p {
        margin: 6px 0 0;
        color: #61716f;
        font-size: 13px;
      }
      main {
        display: grid;
        gap: 10px;
        min-height: 0;
        padding: 14px;
        overflow-y: auto;
      }
      main.is-connecting {
        align-content: center;
      }
      main.is-chatting {
        align-content: start;
      }
      .connection {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        justify-self: center;
        width: min(86vw, 300px);
        padding: 14px;
        border: 1px solid #d9e8e4;
        border-radius: 16px;
        background: #f7fcfa;
        box-shadow: 0 14px 34px rgba(34, 72, 68, 0.08);
      }
      .connection-row {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #177a89;
        font-size: 14px;
        font-weight: 700;
        animation: messageIn 180ms ease forwards;
      }
      .connection-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: currentColor;
      }
      .connection-row .connection-dot {
        animation: pulse 900ms ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% {
          transform: scale(0.85);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.18);
          opacity: 1;
        }
      }
      .bubble {
        max-width: min(88%, 310px);
        padding: 12px 14px;
        border-radius: 16px;
        font-size: 15px;
        line-height: 1.45;
        opacity: 0;
        transform: translateY(8px);
        animation: messageIn 260ms ease forwards;
      }
      .agent {
        justify-self: start;
        background: #f1f7f5;
        color: #233c39;
      }
      .user {
        justify-self: end;
        background: #177a89;
        color: #fff;
      }
      @keyframes messageIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      footer {
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr) 40px auto;
        align-items: center;
        gap: 6px;
        padding: 9px 9px calc(9px + var(--safe-bottom));
        border-top: 1px solid #dce8e5;
        background: #fbfefd;
      }
      .tool-button {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid #d5e1de;
        border-radius: 50%;
        background: #f2f8f6;
        color: #28615c;
        padding: 0;
      }
      .tool-button svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2.2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      input {
        min-width: 0;
        min-height: 40px;
        border: 1px solid #d5e1de;
        border-radius: 999px;
        padding: 9px 12px;
        font-size: 16px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 0 16px;
        background: #177a89;
        color: #fff;
        font-weight: 800;
      }
      .end-consult-button {
        min-height: 32px;
        flex-shrink: 0;
        padding-inline: 12px;
        border: 1px solid #c84444;
        background: #d64b4b;
        color: #fff;
        font-size: 13px;
      }
      .end-consult-button:disabled {
        opacity: 0.75;
      }
      .send-button {
        min-height: 40px;
        padding-inline: 14px;
      }
      @media (min-width: 480px) {
        body {
          padding: 14px 0;
          place-items: center;
        }
        .page {
          width: min(calc(100vw - 32px), var(--page-max-width));
          height: min(calc(100dvh - 28px), 820px);
          min-height: min(calc(100dvh - 28px), 820px);
          border-radius: 24px;
          overflow: hidden;
          box-shadow: 0 18px 60px rgba(41, 74, 71, 0.16);
        }
      }
      @media (max-width: 360px) {
        header {
          padding-inline: 12px;
        }
        main {
          padding-inline: 12px;
        }
        footer {
          grid-template-columns: 38px minmax(0, 1fr) 38px auto;
          gap: 5px;
          padding-inline: 7px;
        }
        .tool-button {
          width: 38px;
          height: 38px;
        }
        .tool-button svg {
          width: 18px;
          height: 18px;
        }
        .send-button {
          min-height: 38px;
          padding-inline: 11px;
        }
        input {
          min-height: 38px;
          padding-inline: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="chat-header">
          <h1>IBCLC 在线咨询</h1>
          <button class="end-consult-button" id="end-consult" type="button">结束咨询</button>
        </div>
      </header>
      <main id="chat-main" class="is-connecting">
        <div class="connection" id="connection">
          <div class="connection-row"><span class="connection-dot"></span><span id="connection-text">连接中</span></div>
        </div>
      </main>
      <footer>
        <button class="tool-button" type="button" aria-label="上传图片">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <circle cx="8.5" cy="10" r="1.5" />
            <path d="m21 15-4.2-4.2a2 2 0 0 0-2.8 0L6 19" />
          </svg>
        </button>
        <input aria-label="输入消息" placeholder="输入消息..." />
        <button class="tool-button" type="button" aria-label="语音输入">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" />
            <path d="M19 11a7 7 0 0 1-14 0" />
            <path d="M12 18v3" />
            <path d="M8 21h8" />
          </svg>
        </button>
        <button class="send-button" type="button">发送</button>
      </footer>
    </div>
    <script>
      const connection = document.getElementById("connection");
      const connectionText = document.getElementById("connection-text");
      const chatMain = document.getElementById("chat-main");
      const endConsultButton = document.getElementById("end-consult");
      const conversationId =
        new URLSearchParams(window.location.search).get("thread_id") ||
        localStorage.getItem("momcozy_conversation_id") ||
        "";
      const consultId = new URLSearchParams(window.location.search).get("consult_id") || "";
      const consultCompletedStorageKey = "momcozy_ibclc_consult_completed";
      const steps = [
        { text: "连接中", duration: 5000 },
        { text: "连接成功", duration: 1000 },
        { text: "对方正在读取背景中", duration: 5000 },
      ];

      endConsultButton.addEventListener("click", async () => {
        endConsultButton.disabled = true;
        endConsultButton.textContent = "结束中...";
        const result = await recordConsultCompleted();
        publishConsultCompleted(result);
        returnToAgent();
      });

      async function recordConsultCompleted() {
        const fallback = {
          status: conversationId ? "local_completed" : "missing_conversation_id",
          conversation_id: conversationId,
          consult_id: consultId,
          event_type: "ibclc_consult_completed",
        };
        if (!conversationId) return fallback;
        try {
          const response = await fetch("/api/client-event", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              thread_id: conversationId,
              event_type: "ibclc_consult_completed",
              label: "用户已完成一次 IBCLC 在线咨询",
              occurred_at: new Date().toISOString(),
              metadata: {
                consultant_name: "Emily Chen",
                consultant_credentials: "IBCLC",
                source: "ibclc-chat",
                consult_id: consultId,
              },
            }),
          });
          if (!response.ok) return fallback;
          return await response.json();
        } catch (_) {
          // Ending the demo consultation should still work if event recording fails.
          return fallback;
        }
      }

      function publishConsultCompleted(result) {
        const payload = {
          type: "momcozy.ibclc_consult_completed",
          conversation_id: result?.conversation_id || conversationId,
          consult_id: result?.consult_id || consultId,
          event_type: "ibclc_consult_completed",
          completed_at: new Date().toISOString(),
          event: result?.event || "",
          session_state: result?.session_state || null,
        };
        try {
          localStorage.setItem(consultCompletedStorageKey, JSON.stringify(payload));
        } catch (_) {
          // Cross-tab notification is best-effort in this demo.
        }
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin);
        }
      }

      function returnToAgent() {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "/";
      }

      let elapsed = 0;
      steps.forEach((step) => {
        window.setTimeout(() => {
          connectionText.textContent = step.text;
        }, elapsed);
        elapsed += step.duration;
      });

      window.setTimeout(() => {
        connection.remove();
        chatMain.classList.remove("is-connecting");
        chatMain.classList.add("is-chatting");
        const message = document.createElement("div");
        message.className = "bubble agent";
        message.textContent = "你好，我是 Emily Chen，IBCLC。我已经看到你从 CoMate 带过来的背景了，你可以先告诉我现在最困扰你的哺乳问题。";
        chatMain.appendChild(message);
      }, elapsed + 700);
    </script>
  </body>
</html>
