<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Comate Test</title>
    <link rel="stylesheet" href="/styles.css?v=tool-status-20260514" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>CoMate</h1>
        </div>
        <button id="reset" type="button">New</button>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <input id="image-input" class="image-input" type="file" accept="image/*" multiple />
        <button id="attach-image" class="icon-button attach-button" type="button" aria-label="Add image">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2Z" />
            <path d="m3 15 4.5-4.5a1.4 1.4 0 0 1 2 0L14 15" />
            <path d="m13 14 2-2a1.4 1.4 0 0 1 2 0L21 16" />
            <path d="M14.5 8.5h.01" />
          </svg>
        </button>
        <div class="composer-main">
          <div id="image-preview-strip" class="image-preview-strip" hidden></div>
          <textarea id="message" rows="1" placeholder="Message Comate"></textarea>
        </div>
        <button id="send" type="submit">Send</button>
      </form>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <script src="/app.js?v=tool-status-20260514"></script>
  </body>
</html>
